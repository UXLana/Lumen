<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transfer Manifest Prototype — Screenshot Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 40px; }
    h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
    .meta { font-size: 14px; color: #666; margin-bottom: 32px; }
    .meta span { margin-right: 16px; }
    .screen { margin-bottom: 48px; }
    .screen h2 { font-size: 20px; font-weight: 600; margin-bottom: 16px; border-bottom: 1px solid #ddd; padding-bottom: 8px; }
    .states { display: grid; grid-template-columns: repeat(auto-fill, minmax(600px, 1fr)); gap: 24px; }
    .state { background: white; border-radius: 8px; overflow: hidden; border: 1px solid #e0e0e0; }
    .state-label { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 16px; background: #f0f0f0; color: #555; }
    .state img { width: 100%; display: block; }
  </style>
</head>
<body>
  <h1>Transfer Manifest — Detail View</h1>
  <div class="meta">
    <span>Theme: Trace</span>
    <span>Device: Desktop (1440px)</span>
    <span>Fidelity: High-fi</span>
    <span>Date: 2026-03-10</span>
  </div>

  <div class="screen">
    <h2>Detail View</h2>
    <div class="states">
      <div class="state">
        <div class="state-label">Default</div>
        <img src="detail-view-default.png" alt="Detail view — default state with populated manifest data">
      </div>
      <div class="state">
        <div class="state-label">Loading</div>
        <img src="detail-view-loading.png" alt="Detail view — loading state with skeleton placeholders">
      </div>
      <div class="state">
        <div class="state-label">Empty</div>
        <img src="detail-view-empty.png" alt="Detail view — empty state with no packages">
      </div>
      <div class="state">
        <div class="state-label">Error</div>
        <img src="detail-view-error.png" alt="Detail view — error state with retry option">
      </div>
    </div>
  </div>
</body>
</html>
